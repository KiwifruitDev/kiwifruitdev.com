<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css" />
  
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Primary Meta Tags -->
  <title>KiwifruitDev.github.io</title>
  <meta name="title" content="KiwifruitDev.github.io">
  <meta name="description" content="I'm a hobby software developer, I share interesting things that might relate to programming.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://KiwifruitDev.github.io/">
  <meta property="og:title" content="KiwifruitDev.github.io">
  <meta property="og:description" content="I'm a hobby software developer, I share interesting things that might relate to programming.">
  <meta property="og:image" content="https://KiwifruitDev.github.io/img/social.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://KiwifruitDev.github.io/">
  <meta property="twitter:title" content="KiwifruitDev.github.io">
  <meta property="twitter:description" content="I'm a hobby software developer, I share interesting things that might relate to programming.">
  <meta property="twitter:image" content="https://KiwifruitDev.github.io/img/social.png">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'KiwifruitDev',
      repo: 'KiwifruitDev/KiwifruitDev.github.io',
      logo: 'img/kiwi3_circle.png',
      loadNavbar: true,
      loadSidebar: true,
      subMaxLevel: 2,
      formatUpdated: '{MM}/{DD}/{YYYY}',
      share: {
        reddit: true,
        facebook: true,
        twitter: true,
        telegram: true,
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//unpkg.com/docsify-share/build/index.min.js"></script>
</body>
</html>
