<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/dark.css" />

  <!-- Required meta tags -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Disable cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Primary Meta Tags -->
  <title>KiwifruitDev</title>
  <meta name="title" content="KiwifruitDev">
  <meta name="description" content="Personal blog of a software developer from Las Vegas.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kiwifruitdev.com">
  <meta property="og:title" content="KiwifruitDev">
  <meta property="og:description" content="Personal blog of a software developer from Las Vegas.">
  <meta property="og:image" content="https://kiwifruitdev.com/img/social.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://kiwifruitdev.com">
  <meta property="twitter:title" content="KiwifruitDev">
  <meta property="twitter:description" content="Personal blog of a software developer from Las Vegas.">
  <meta property="twitter:image" content="https://kiwifruitdev.com/img/social.png">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'KiwifruitDev',
      repo: 'KiwifruitDev/kiwifruitdev.com',
      logo: 'img/kiwifruitdevlogo.png',
      loadNavbar: true,
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true
    }
  </script>
  <!-- Docsify v4 -->
  <script src="js/docsify.js"></script>
  <!-- Plugins -->
  <script src="js/search.min.js"></script>
  <script src="js/zoom-image.min.js"></script>
  <script src="js/docsify-tabs.js"></script>
  <script src="js/docsify-copy-code.js"></script>
</body>
</html>
